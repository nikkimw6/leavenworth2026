<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bigfoot Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a6e2a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none;
  }
  #game-wrapper { position: relative; width: 100%; max-width: 600px; }
  #title-screen {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #5ba8e0 0%, #8dc8f0 40%, #4a9e4a 70%, #2d6e2d 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; user-select: none;
  }
  #title-screen h1 {
    font-size: clamp(28px,8vw,52px); color: #fff; letter-spacing: 2px;
    text-shadow: 3px 3px 0 #2a5a1a, 0 0 30px rgba(60,160,60,0.5); line-height: 1.1; margin-bottom: 8px;
  }
  #title-screen .bigfoot-title {
    font-size: clamp(60px,18vw,110px); line-height: 1;
    filter: drop-shadow(0 4px 8px rgba(0,80,0,0.5)); animation: breathe 2s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  .subtitle { color: #1a4a1a; font-size: clamp(11px,3vw,15px); margin: 10px 0 24px; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; }
  .start-btn {
    background: #e8780a; color: #fff; border: none; padding: 14px 36px;
    font-family: 'Courier New', monospace; font-size: clamp(14px,4vw,18px);
    font-weight: bold; letter-spacing: 2px; cursor: pointer; border-radius: 4px;
    box-shadow: 4px 4px 0 #5c3d1e; transition: transform 0.1s, box-shadow 0.1s;
  }
  .start-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #5c3d1e; }
  .instructions { color: #1a4a1a; font-size: clamp(10px,2.5vw,13px); margin-top: 16px; line-height: 1.8; font-weight: bold; }
  #game-over-screen {
    position: absolute; inset: 0; background: rgba(20,60,20,0.93);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; border-radius: 12px; text-align: center; padding: 20px;
  }
  #game-over-screen h2 { color: #e8780a; font-size: clamp(28px,9vw,48px); letter-spacing: 2px; text-shadow: 2px 2px 0 #5c3d1e; margin-bottom: 8px; }
  .final-score { color: #f5f0e8; font-size: clamp(14px,4vw,20px); margin: 8px 0; letter-spacing: 1px; }
  .final-score span { color: #e8780a; font-size: 1.4em; }
  canvas { display: block; width: 100%; border-radius: 12px; cursor: pointer; }
  #hud {
    position: absolute; top: 12px; left: 0; right: 0;
    display: flex; justify-content: space-between; padding: 0 16px; pointer-events: none; z-index: 10;
  }
  .hud-box {
    background: rgba(20,60,20,0.65); border: 1px solid #4a9e4a; color: #fff;
    font-family: 'Courier New', monospace; font-size: clamp(11px,3vw,15px);
    padding: 6px 12px; border-radius: 4px; letter-spacing: 1px;
  }
  .hud-box .label { color: #90ee90; font-size: 0.75em; display: block; }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="title-screen" onclick="startGame()">
    <div class="bigfoot-title">🦶</div>
    <h1>BIGFOOT<br>RUNNER</h1>
    <p class="subtitle">Stay hidden. Stay wild.</p>
    <button class="start-btn" onclick="startGame()">START RUNNING</button>
    <p class="instructions">
      TAP / SPACE / CLICK to jump · Double-jump!<br>
      ⭐ Collect badges, s'mores, hot dogs &amp; more<br>
      🏕️ Dodge tents, campfires &amp; lanterns
    </p>
  </div>
  <div id="game-over-screen">
    <div style="font-size:64px;margin-bottom:8px">🦶</div>
    <h2>SPOTTED!</h2>
    <p class="final-score">Score: <span id="final-score-val">0</span></p>
    <p class="final-score" style="font-size:.85em;color:#90ee90">Best: <span id="best-score-val">0</span></p>
    <button class="start-btn" style="margin-top:20px" onclick="startGame()">RUN AGAIN</button>
  </div>
  <div id="hud">
    <div class="hud-box"><span class="label">SCORE</span><span id="score-display">0</span></div>
    <div class="hud-box"><span class="label">BEST</span><span id="best-display">0</span></div>
    <div class="hud-box"><span class="label">SPEED</span><span id="spd">1x</span></div>
  </div>
  <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 600, H = 280;
canvas.width = W; canvas.height = H;
const GROUND_Y = H - 55;

let state = 'title', score = 0, best = 0, frame = 0, speed = 4;
let gameOver = false, animId, footprintTimer = 0;
let obstacles = [], collectibles = [], particles = [];
let bgLayer1 = [], bgLayer2 = [], bgLayer3 = []; // parallax forest layers
let groundDetails = [], footprints = [];
let lastObstacle = 0, lastCollectible = 0;

const BF = {
  x: 80, y: GROUND_Y, w: 46, h: 58,
  vy: 0, jumping: false, doubleJumped: false, legPhase: 0,
  getTop() { return this.y - this.h; }
};

// ── BACKGROUND: DAYTIME FOREST ────────────────────────────────────────────

function initBG() {
  // Layer 1: distant misty trees (slowest)
  bgLayer1 = [];
  for (let i = 0; i < 14; i++) {
    bgLayer1.push({
      x: Math.random() * W,
      h: 55 + Math.random() * 30,
      w: 22 + Math.random() * 14,
      spd: 0.25,
      hue: 80 + Math.random() * 30 // blue-green hazy
    });
  }
  // Layer 2: mid forest (medium speed)
  bgLayer2 = [];
  for (let i = 0; i < 10; i++) {
    bgLayer2.push({
      x: Math.random() * W,
      h: 70 + Math.random() * 40,
      w: 28 + Math.random() * 18,
      spd: 0.6,
      variant: Math.floor(Math.random() * 3) // pine, oak, birch-ish
    });
  }
  // Layer 3: near foreground trees (fastest bg layer)
  bgLayer3 = [];
  for (let i = 0; i < 6; i++) {
    bgLayer3.push({
      x: Math.random() * W,
      h: 90 + Math.random() * 50,
      w: 36 + Math.random() * 20,
      spd: 1.2
    });
  }
  // Ground details: ferns, mushrooms, pebbles
  groundDetails = [];
  for (let i = 0; i < 30; i++) {
    groundDetails.push({
      x: Math.random() * W,
      type: ['fern','fern','grass','pebble','mushroom'][Math.floor(Math.random()*5)],
      scale: 0.7 + Math.random() * 0.6
    });
  }
}

function drawBackground() {
  // Daytime sky gradient: bright blue top, lighter at horizon
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, '#5ba8e0');
  skyGrad.addColorStop(0.55, '#a8d8f0');
  skyGrad.addColorStop(1, '#c8eac0');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Sun (dappled through trees - soft glow top-right)
  const sunGrad = ctx.createRadialGradient(W*0.88, 18, 0, W*0.88, 18, 80);
  sunGrad.addColorStop(0, 'rgba(255,245,180,0.95)');
  sunGrad.addColorStop(0.25, 'rgba(255,225,120,0.4)');
  sunGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = sunGrad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Sun disc
  ctx.fillStyle = '#fff8c0';
  ctx.beginPath(); ctx.arc(W*0.88, 18, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,245,150,0.5)';
  ctx.beginPath(); ctx.arc(W*0.88, 18, 22, 0, Math.PI*2); ctx.fill();

  // Light rays / god rays (subtle)
  ctx.save();
  ctx.globalAlpha = 0.06;
  for (let i = 0; i < 5; i++) {
    const angle = -0.3 + i * 0.18;
    ctx.fillStyle = '#ffffc0';
    ctx.beginPath();
    ctx.moveTo(W*0.88, 18);
    ctx.lineTo(W*0.88 + Math.cos(angle + Math.PI/2)*300, 18 + Math.sin(angle + Math.PI/2)*300);
    ctx.lineTo(W*0.88 + Math.cos(angle + Math.PI/2 + 0.08)*300, 18 + Math.sin(angle + Math.PI/2 + 0.08)*300);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // ── Layer 1: distant hazy forest silhouette ──
  bgLayer1.forEach(t => {
    t.x -= t.spd * (speed / 4);
    if (t.x + t.w < 0) { t.x = W + t.w; t.h = 55 + Math.random() * 30; }
    const col = `hsl(${t.hue}, 35%, 62%)`;
    drawTreeSilhouette(t.x, GROUND_Y, t.w, t.h, col, 0.55);
  });

  // ── Layer 2: mid forest ──
  bgLayer2.forEach(t => {
    t.x -= t.spd * (speed / 4);
    if (t.x + t.w < 0) { t.x = W + t.w; t.h = 70 + Math.random() * 40; }
    if (t.variant === 0) drawPineTree(t.x, GROUND_Y, t.w, t.h, '#2e7d32', '#1b5e20', 0.82);
    else if (t.variant === 1) drawOakTree(t.x, GROUND_Y, t.w, t.h, '#388e3c', '#2e7d32', 0.82);
    else drawBirchTree(t.x, GROUND_Y, t.w, t.h, 0.82);
  });

  // Canopy dapple patches (light through leaves)
  ctx.save();
  ctx.globalAlpha = 0.07;
  for (let i = 0; i < 8; i++) {
    const px = (i * 97 + frame * 0.08) % (W + 60) - 30;
    const py = GROUND_Y - 30 - (i % 3) * 20;
    ctx.fillStyle = '#e8f8a0';
    ctx.beginPath(); ctx.ellipse(px, py, 22, 10, -0.3, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawTreeSilhouette(x, groundY, w, h, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  // Trunk
  ctx.fillRect(x + w*0.4, groundY - h*0.25, w*0.2, h*0.25);
  // Crown (rounded blob)
  ctx.beginPath(); ctx.arc(x + w/2, groundY - h*0.55, w*0.52, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w*0.3, groundY - h*0.45, w*0.35, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w*0.72, groundY - h*0.42, w*0.32, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPineTree(x, groundY, w, h, col1, col2, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  const cx = x + w/2;
  // Trunk
  ctx.fillStyle = '#5d4037';
  ctx.fillRect(cx - w*0.1, groundY - h*0.22, w*0.2, h*0.22);
  // Three tiers
  const tiers = 3;
  for (let i = 0; i < tiers; i++) {
    const ty = groundY - h * (0.22 + i * 0.26);
    const tw = w * (0.9 - i * 0.18);
    ctx.fillStyle = i % 2 === 0 ? col1 : col2;
    ctx.beginPath();
    ctx.moveTo(cx, ty - h*0.32);
    ctx.lineTo(cx - tw/2, ty);
    ctx.lineTo(cx + tw/2, ty);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawOakTree(x, groundY, w, h, col1, col2, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  const cx = x + w/2;
  ctx.fillStyle = '#6d4c41';
  ctx.fillRect(cx - w*0.1, groundY - h*0.3, w*0.2, h*0.3);
  ctx.fillStyle = col1;
  ctx.beginPath(); ctx.arc(cx, groundY - h*0.55, w*0.48, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = col2;
  ctx.beginPath(); ctx.arc(cx - w*0.22, groundY - h*0.45, w*0.32, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + w*0.22, groundY - h*0.42, w*0.30, 0, Math.PI*2); ctx.fill();
  // highlight top
  ctx.fillStyle = 'rgba(100,200,80,0.25)';
  ctx.beginPath(); ctx.arc(cx - w*0.08, groundY - h*0.65, w*0.25, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBirchTree(x, groundY, w, h, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  const cx = x + w/2;
  // Pale trunk
  ctx.fillStyle = '#c8c8b4';
  ctx.fillRect(cx - w*0.08, groundY - h*0.35, w*0.16, h*0.35);
  // Dark bark marks
  ctx.fillStyle = '#5a5a4a';
  for (let i = 0; i < 3; i++) {
    ctx.fillRect(cx - w*0.08, groundY - h*(0.12 + i*0.1), w*0.16, h*0.025);
  }
  // Leafy crown - light fresh green
  ctx.fillStyle = '#7cb87c';
  ctx.beginPath(); ctx.arc(cx, groundY - h*0.52, w*0.38, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#90cc80';
  ctx.beginPath(); ctx.arc(cx - w*0.18, groundY - h*0.44, w*0.26, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + w*0.16, groundY - h*0.46, w*0.24, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawGround() {
  // Rich green ground
  const gg = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  gg.addColorStop(0, '#4caf50');
  gg.addColorStop(0.12, '#388e3c');
  gg.addColorStop(0.4, '#5c3d1e');
  gg.addColorStop(1, '#3a2610');
  ctx.fillStyle = gg; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Grass top edge
  ctx.strokeStyle = '#66bb6a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();

  // Ground details (ferns, grass tufts, mushrooms, pebbles)
  groundDetails.forEach(d => {
    d.x -= speed * 0.85;
    if (d.x < -20) d.x = W + 20;
    const s = d.scale;
    if (d.type === 'fern') {
      ctx.strokeStyle = '#2e7d32'; ctx.lineWidth = 1.2;
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(d.x, GROUND_Y);
        ctx.quadraticCurveTo(d.x + i * 8 * s, GROUND_Y - 10 * s, d.x + i * 14 * s, GROUND_Y - 4 * s);
        ctx.stroke();
      }
    } else if (d.type === 'grass') {
      ctx.strokeStyle = '#43a047'; ctx.lineWidth = 1.5;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath(); ctx.moveTo(d.x + i*5*s, GROUND_Y); ctx.lineTo(d.x + i*6*s + i*2, GROUND_Y - 9*s); ctx.stroke();
      }
    } else if (d.type === 'mushroom') {
      // Stem
      ctx.fillStyle = '#f5f0e8';
      ctx.fillRect(d.x - 2*s, GROUND_Y - 8*s, 4*s, 8*s);
      // Cap
      ctx.fillStyle = '#e53935';
      ctx.beginPath(); ctx.arc(d.x, GROUND_Y - 9*s, 6*s, Math.PI, 0); ctx.fill();
      // Spots
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(d.x - 2*s, GROUND_Y - 11*s, 1.5*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(d.x + 2*s, GROUND_Y - 10*s, 1.2*s, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = '#8d6e63';
      ctx.beginPath(); ctx.ellipse(d.x, GROUND_Y + 4, 4*s, 3*s, 0, 0, Math.PI*2); ctx.fill();
    }
  });

  // Near foreground trees (drawn after ground so roots overlap ground edge)
  bgLayer3.forEach(t => {
    t.x -= t.spd * (speed / 4);
    if (t.x + t.w < 0) { t.x = W + t.w; t.h = 90 + Math.random() * 50; }
    drawPineTree(t.x, GROUND_Y, t.w, t.h, '#1b5e20', '#145214', 1.0);
  });
}

// ── OBSTACLE DRAWERS ──────────────────────────────────────────────────────

function drawTentCanvas(x, y, w, h) {
  const cx = x + w/2, base = y + h;
  ctx.fillStyle = '#e8780a';
  ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(x,base); ctx.lineTo(x+w,base); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#c45e00';
  ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(x,base); ctx.lineTo(cx,base); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1a3a2a';
  ctx.beginPath(); ctx.arc(cx, base-1, w*0.18, Math.PI, 0); ctx.lineTo(cx+w*0.18,base); ctx.lineTo(cx-w*0.18,base); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#ffaa44'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx,y-2); ctx.lineTo(cx,y+h*0.4); ctx.stroke();
  ctx.lineWidth = 1; ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(x-8,base-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(x+w+8,base-4); ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawCampfireCanvas(x, y, w, h) {
  const cx = x + w/2, base = y + h;
  ctx.save(); ctx.translate(cx, base-6); ctx.rotate(0.4);
  ctx.fillStyle = '#5c3d1e'; ctx.fillRect(-w*0.38,-5,w*0.76,9); ctx.restore();
  ctx.save(); ctx.translate(cx, base-6); ctx.rotate(-0.4);
  ctx.fillStyle = '#3a2610'; ctx.fillRect(-w*0.38,-5,w*0.76,9); ctx.restore();
  ctx.fillStyle = '#888';
  for (let i=0;i<5;i++) {
    const a=(i/5)*Math.PI*2;
    ctx.beginPath(); ctx.ellipse(cx+Math.cos(a)*w*0.3, base-3+Math.sin(a)*4, 4,3,a,0,Math.PI*2); ctx.fill();
  }
  const fl=Math.sin(frame*0.25)*2, fl2=Math.cos(frame*0.3)*2;
  ctx.fillStyle='#e8780a';
  ctx.beginPath(); ctx.moveTo(cx,y+2+fl);
  ctx.bezierCurveTo(cx+w*0.22,base-h*0.55,cx+w*0.32,base-h*0.25,cx+w*0.22,base-10);
  ctx.bezierCurveTo(cx,base-12,cx-w*0.22,base-10,cx-w*0.22,base-10);
  ctx.bezierCurveTo(cx-w*0.32,base-h*0.25,cx-w*0.22,base-h*0.55,cx,y+2+fl); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ffd040';
  ctx.beginPath(); ctx.moveTo(cx+fl2,y+h*0.25+fl);
  ctx.bezierCurveTo(cx+w*0.14,base-h*0.5,cx+w*0.18,base-h*0.2,cx+w*0.12,base-12);
  ctx.bezierCurveTo(cx,base-14,cx-w*0.12,base-12,cx-w*0.12,base-12);
  ctx.bezierCurveTo(cx-w*0.18,base-h*0.2,cx-w*0.14,base-h*0.5,cx+fl2,y+h*0.25+fl); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,220,0.7)';
  ctx.beginPath(); ctx.ellipse(cx,base-h*0.35,w*0.07,h*0.12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffaa44';
  for(let i=0;i<3;i++){
    const sx=cx+Math.sin(frame*0.2+i*2.1)*w*0.18;
    const sy=base-h*0.55-(((frame*0.8+i*30)%30));
    ctx.globalAlpha=Math.max(0,1-((frame*0.8+i*30)%30)/30);
    ctx.beginPath(); ctx.arc(sx,sy,1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawCampLanternCanvas(x, y, w, h) {
  const cx = x + w/2;
  const fl = Math.sin(frame * 0.15) * 1.2;
  const grd = ctx.createRadialGradient(cx, y+h, 0, cx, y+h, w*1.2);
  grd.addColorStop(0, 'rgba(255,200,60,0.18)'); grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd; ctx.fillRect(x-w*0.7, y, w*2.4, h+10);
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(cx, y + h*0.18, w*0.36, Math.PI, 0); ctx.stroke();
  ctx.fillStyle = '#3d5c2a';
  ctx.beginPath(); ctx.moveTo(cx-w*0.28, y+h*0.18); ctx.lineTo(cx+w*0.28, y+h*0.18); ctx.lineTo(cx+w*0.22, y+h*0.30); ctx.lineTo(cx-w*0.22, y+h*0.30); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#556b2f'; ctx.fillRect(cx-w*0.3, y+h*0.28, w*0.6, h*0.06);
  ctx.strokeStyle='#2a3e1a'; ctx.lineWidth=1;
  for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(cx+i*w*0.1,y+h*0.19);ctx.lineTo(cx+i*w*0.1,y+h*0.28);ctx.stroke();}
  const glassGrad=ctx.createLinearGradient(x,0,x+w,0);
  glassGrad.addColorStop(0,'rgba(180,90,0,0.6)');
  glassGrad.addColorStop(0.3,`rgba(255,${160+Math.floor(fl*8)},40,0.85)`);
  glassGrad.addColorStop(0.7,`rgba(255,${140+Math.floor(fl*8)},20,0.75)`);
  glassGrad.addColorStop(1,'rgba(160,70,0,0.55)');
  ctx.fillStyle=glassGrad;
  ctx.beginPath(); ctx.roundRect(cx-w*0.28,y+h*0.34,w*0.56,h*0.46,4); ctx.fill();
  ctx.fillStyle='rgba(255,255,200,0.25)';
  ctx.beginPath(); ctx.roundRect(cx-w*0.18,y+h*0.36,w*0.1,h*0.4,3); ctx.fill();
  ctx.fillStyle=`rgba(255,${230+Math.floor(fl*5)},180,0.9)`;
  ctx.beginPath(); ctx.ellipse(cx,y+h*0.57,w*0.12,h*0.14,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3d5c2a'; ctx.beginPath(); ctx.roundRect(cx-w*0.3,y+h*0.8,w*0.6,h*0.22,3); ctx.fill();
  ctx.fillStyle='#556b2f'; ctx.fillRect(cx-w*0.28,y+h*0.86,w*0.56,h*0.07);
  ctx.fillStyle='#2a3e1a'; ctx.beginPath(); ctx.ellipse(cx,y+h*1.02,w*0.32,h*0.06,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#556b2f'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cx-w*0.3,y+h*0.30); ctx.lineTo(cx-w*0.3,y+h*0.80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+w*0.3,y+h*0.30); ctx.lineTo(cx+w*0.3,y+h*0.80); ctx.stroke();
}

// ── COLLECTIBLE DRAWERS ───────────────────────────────────────────────────

function drawLogoCollectible(x, y, size) {
  const cx=x+size/2, cy=y+size/2, r=size/2;
  ctx.save();
  ctx.fillStyle='#1565c0'; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(245,240,232,0.92)'; ctx.beginPath(); ctx.arc(cx,cy,r*0.82,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a75d2'; ctx.beginPath(); ctx.arc(cx,cy,r*0.72,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation='destination-out';
  drawStarShape(cx,cy,5,r*0.46,r*0.19);
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.beginPath(); ctx.arc(cx-r*0.2,cy-r*0.25,r*0.35,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawStarShape(cx,cy,pts,outerR,innerR){
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const a=(i*Math.PI)/pts-Math.PI/2, r=i%2===0?outerR:innerR;
    if(i===0) ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    else ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
}

function drawSmore(x, y, s) {
  const cx=x+s/2, cy=y+s/2;
  ctx.fillStyle='#c8922a'; ctx.beginPath(); ctx.roundRect(cx-s*0.42,cy+s*0.05,s*0.84,s*0.28,3); ctx.fill();
  ctx.strokeStyle='#a06818'; ctx.lineWidth=0.8; ctx.strokeRect(cx-s*0.42,cy+s*0.05,s*0.84,s*0.28);
  ctx.lineWidth=0.7;
  ctx.beginPath(); ctx.moveTo(cx,cy+s*0.05); ctx.lineTo(cx,cy+s*0.33); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-s*0.42,cy+s*0.19); ctx.lineTo(cx+s*0.42,cy+s*0.19); ctx.stroke();
  ctx.fillStyle='#f5f0e8'; ctx.beginPath(); ctx.roundRect(cx-s*0.36,cy-s*0.15,s*0.72,s*0.26,6); ctx.fill();
  ctx.fillStyle='#5c2a00'; ctx.beginPath(); ctx.roundRect(cx-s*0.3,cy-s*0.32,s*0.6,s*0.2,3); ctx.fill();
  ctx.strokeStyle='#3a1800'; ctx.lineWidth=0.7;
  ctx.beginPath(); ctx.moveTo(cx,cy-s*0.32); ctx.lineTo(cx,cy-s*0.12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-s*0.15,cy-s*0.32); ctx.lineTo(cx-s*0.15,cy-s*0.12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+s*0.15,cy-s*0.32); ctx.lineTo(cx+s*0.15,cy-s*0.12); ctx.stroke();
  ctx.fillStyle='#c8922a'; ctx.beginPath(); ctx.roundRect(cx-s*0.4,cy-s*0.48,s*0.8,s*0.2,3); ctx.fill();
  ctx.strokeStyle='#a06818'; ctx.lineWidth=0.8; ctx.strokeRect(cx-s*0.4,cy-s*0.48,s*0.8,s*0.2);
}

function drawSodaBottle(x, y, s) {
  const cx=x+s/2, cy=y+s/2;
  ctx.fillStyle='#2d6e2d';
  ctx.beginPath();
  ctx.moveTo(cx-s*0.2,cy+s*0.45); ctx.lineTo(cx-s*0.26,cy+s*0.1);
  ctx.bezierCurveTo(cx-s*0.26,cy-s*0.1,cx-s*0.22,cy-s*0.2,cx-s*0.14,cy-s*0.28);
  ctx.lineTo(cx-s*0.1,cy-s*0.44); ctx.lineTo(cx+s*0.1,cy-s*0.44); ctx.lineTo(cx+s*0.14,cy-s*0.28);
  ctx.bezierCurveTo(cx+s*0.22,cy-s*0.2,cx+s*0.26,cy-s*0.1,cx+s*0.26,cy+s*0.1);
  ctx.lineTo(cx+s*0.2,cy+s*0.45); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.moveTo(cx-s*0.16,cy+s*0.4); ctx.lineTo(cx-s*0.22,cy+s*0.1); ctx.lineTo(cx-s*0.12,cy+s*0.1); ctx.lineTo(cx-s*0.06,cy+s*0.4); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#cc2200'; ctx.beginPath(); ctx.roundRect(cx-s*0.24,cy,s*0.48,s*0.28,2); ctx.fill();
  ctx.fillStyle='#ff4422'; ctx.font=`bold ${s*0.14}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('SODA',cx,cy+s*0.14);
  ctx.fillStyle='#cc2200'; ctx.beginPath(); ctx.roundRect(cx-s*0.1,cy-s*0.5,s*0.2,s*0.08,2); ctx.fill();
}

function drawHamburger(x, y, s) {
  const cx=x+s/2, cy=y+s/2;
  ctx.fillStyle='#c8922a'; ctx.beginPath(); ctx.roundRect(cx-s*0.4,cy+s*0.22,s*0.8,s*0.2,[0,0,8,8]); ctx.fill();
  ctx.fillStyle='#5c2a00'; ctx.beginPath(); ctx.roundRect(cx-s*0.38,cy+s*0.08,s*0.76,s*0.18,3); ctx.fill();
  ctx.fillStyle='#7a3800'; ctx.beginPath(); ctx.roundRect(cx-s*0.38,cy+s*0.08,s*0.76,s*0.07,2); ctx.fill();
  ctx.fillStyle='#f0c030'; ctx.beginPath(); ctx.roundRect(cx-s*0.4,cy+s*0.04,s*0.82,s*0.1,2); ctx.fill();
  ctx.fillStyle='#3a8a2a'; ctx.beginPath(); ctx.moveTo(cx-s*0.42,cy+s*0.04);
  for(let i=0;i<5;i++){ctx.quadraticCurveTo(cx-s*0.42+i*s*0.17+s*0.085,cy-s*0.03,cx-s*0.42+(i+1)*s*0.17,cy+s*0.04);}
  ctx.lineTo(cx+s*0.42,cy+s*0.1); ctx.lineTo(cx-s*0.42,cy+s*0.1); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#d4a040'; ctx.beginPath(); ctx.arc(cx,cy-s*0.1,s*0.38,Math.PI,0); ctx.lineTo(cx+s*0.38,cy+s*0.04); ctx.lineTo(cx-s*0.38,cy+s*0.04); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#f5f0e8';
  for(let i=0;i<4;i++){const sx=cx-s*0.2+i*s*0.12,sy=cy-s*0.2+Math.sin(i*1.3)*s*0.06;ctx.save();ctx.translate(sx,sy);ctx.rotate(Math.sin(i)*0.8);ctx.beginPath();ctx.ellipse(0,0,s*0.04,s*0.025,0,0,Math.PI*2);ctx.fill();ctx.restore();}
}

function drawHotDog(x, y, s) {
  const cx=x+s/2, cy=y+s/2;
  ctx.fillStyle='#c8922a'; ctx.beginPath(); ctx.ellipse(cx,cy+s*0.28,s*0.44,s*0.2,0,0,Math.PI); ctx.fill();
  ctx.fillStyle='#b84422'; ctx.beginPath(); ctx.roundRect(cx-s*0.4,cy+s*0.02,s*0.8,s*0.22,10); ctx.fill();
  ctx.fillStyle='rgba(255,150,100,0.3)'; ctx.beginPath(); ctx.roundRect(cx-s*0.36,cy+s*0.04,s*0.72,s*0.08,8); ctx.fill();
  ctx.fillStyle='#9a3318';
  ctx.beginPath(); ctx.ellipse(cx-s*0.4,cy+s*0.13,s*0.05,s*0.09,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+s*0.4,cy+s*0.13,s*0.05,s*0.09,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#d4a040'; ctx.beginPath(); ctx.ellipse(cx,cy+s*0.04,s*0.44,s*0.2,0,Math.PI,0); ctx.fill();
  ctx.strokeStyle='#f0c030'; ctx.lineWidth=s*0.06; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(cx-s*0.3,cy+s*0.08);
  for(let i=0;i<6;i++){ctx.lineTo(cx-s*0.3+i*s*0.1+s*0.05,cy+(i%2===0?s*0.02:s*0.18));}
  ctx.stroke(); ctx.lineCap='butt';
}

// ── OBSTACLE / COLLECTIBLE TYPES ─────────────────────────────────────────

const OBSTACLE_TYPES = [
  { type:'tent',     w:52, h:44 },
  { type:'campfire', w:40, h:38 },
  { type:'lantern',  w:28, h:48 },
  { type:'log',      w:38, h:26, emoji:'🪵' },
  { type:'rock',     w:34, h:26, emoji:'🪨' },
  { type:'ranger',   w:38, h:52, emoji:'🔦' },
];

const COLLECT_TYPES = [
  { type:'logo',   pts:25, sz:32 },
  { type:'logo',   pts:25, sz:32 },
  { type:'smore',  pts:10, sz:30 },
  { type:'smore',  pts:10, sz:30 },
  { type:'soda',   pts:8,  sz:28 },
  { type:'burger', pts:12, sz:32 },
  { type:'hotdog', pts:10, sz:32 },
];

// ── SPAWN (with overlap check) ────────────────────────────────────────────

function spawnObstacle() {
  const t = OBSTACLE_TYPES[Math.floor(Math.random()*OBSTACLE_TYPES.length)];
  obstacles.push({ ...t, x: W+20, y: GROUND_Y-t.h });
}

function spawnCollectible() {
  const t = COLLECT_TYPES[Math.floor(Math.random()*COLLECT_TYPES.length)];
  const sz = t.sz;

  // Two height options: ground level or elevated (more interesting)
  // ground: sit just above ground. elevated: 50-100px above ground
  const elevated = Math.random() > 0.35;
  const yOff = elevated
    ? GROUND_Y - sz - 50 - Math.random() * 45
    : GROUND_Y - sz - 2;

  // Check: don't place within 80px x-overlap of any existing obstacle near spawn point
  const spawnX = W + 20;
  const tooClose = obstacles.some(o => {
    const dx = Math.abs((o.x + o.w/2) - (spawnX + sz/2));
    return dx < 90;
  });
  if (tooClose) return; // skip this frame, try again next cycle

  collectibles.push({ ...t, x: spawnX, y: yOff, collected: false });
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-0.5)*5,vy:Math.random()*-4-1,life:1,decay:0.05+Math.random()*0.04,r:3+Math.random()*4,color});
}
function showScorePopup(x,y,text,color){
  particles.push({isText:true,x,y,text,color,life:1.2,decay:0.04,vy:-2});
}

// ── DRAW ──────────────────────────────────────────────────────────────────

function drawObstacle(o) {
  if(o.type==='tent') drawTentCanvas(o.x,o.y,o.w,o.h);
  else if(o.type==='campfire') drawCampfireCanvas(o.x,o.y,o.w,o.h);
  else if(o.type==='lantern') drawCampLanternCanvas(o.x,o.y,o.w,o.h);
  else { ctx.font=`${Math.min(o.w,o.h)*1.2}px serif`; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText(o.emoji,o.x+o.w/2,o.y+o.h); }
}

function drawCollectible(c) {
  if (c.collected) return;
  // Gentle bob: small amplitude (2px), anchored to fixed y
  const bob = Math.sin(frame * 0.06 + c.x * 0.05) * 2;
  ctx.save();
  ctx.translate(0, bob);
  const s = c.sz, cx2 = c.x, cy2 = c.y;
  if (c.type==='logo') {
    const pulse = 0.4 + Math.sin(frame*0.08) * 0.2;
    ctx.save(); ctx.globalAlpha = pulse * 0.3; ctx.fillStyle = '#1a75d2';
    ctx.beginPath(); ctx.arc(cx2+s/2,cy2+s/2,s*0.62,0,Math.PI*2); ctx.fill(); ctx.restore();
    drawLogoCollectible(cx2, cy2, s);
  } else if (c.type==='smore')  drawSmore(cx2, cy2, s);
  else if (c.type==='soda')     drawSodaBottle(cx2, cy2, s);
  else if (c.type==='burger')   drawHamburger(cx2, cy2, s);
  else if (c.type==='hotdog')   drawHotDog(cx2, cy2, s);
  ctx.restore();
}

// ── BIGFOOT ───────────────────────────────────────────────────────────────

function drawBigfoot() {
  const bx=BF.x,by=BF.y,bw=BF.w,bh=BF.h,top=by-bh,cx=bx+bw/2,onGround=!BF.jumping;
  ctx.save(); ctx.globalAlpha=0.25; ctx.fillStyle='#1a3a1a';
  ctx.beginPath(); ctx.ellipse(cx,by+2,bw*0.5,5,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.fillStyle='#5c3200'; ctx.beginPath(); ctx.roundRect(bx+6,top+22,bw-12,bh-30,10); ctx.fill();
  ctx.strokeStyle='#7a4a10'; ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(bx+8+i*5,top+28);ctx.lineTo(bx+10+i*5,top+40);ctx.stroke();}
  const armSwing=onGround?Math.sin(BF.legPhase)*8:0;
  ctx.fillStyle='#5c3200';
  ctx.beginPath();ctx.roundRect(bx,top+24+armSwing,10,22,5);ctx.fill();
  ctx.beginPath();ctx.roundRect(bx+bw-10,top+24-armSwing,10,22,5);ctx.fill();
  const legSwing=onGround?Math.sin(BF.legPhase)*10:(BF.vy<0?-15:10);
  ctx.fillStyle='#4a2800';
  ctx.save();ctx.translate(cx-8,by-14);ctx.rotate(legSwing*Math.PI/180);ctx.beginPath();ctx.roundRect(-5,0,12,20,5);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(cx+8,by-14);ctx.rotate(-legSwing*Math.PI/180);ctx.beginPath();ctx.roundRect(-5,0,12,20,5);ctx.fill();ctx.restore();
  ctx.fillStyle='#3a1f00';
  ctx.beginPath();ctx.ellipse(cx-8,by+1,10,5,-0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+8,by+1,10,5,0.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6b3d05';ctx.beginPath();ctx.arc(cx,top+14,15,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a1f00';ctx.beginPath();ctx.arc(cx-5,top+12,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+5,top+12,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(180,100,0,0.5)';
  ctx.beginPath();ctx.arc(cx-5,top+12,1.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+5,top+12,1.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a1f00';ctx.beginPath();ctx.arc(cx,top+17,3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#3a1f00';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(cx-9,top+8);ctx.lineTo(cx-3,top+10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+9,top+8);ctx.lineTo(cx+3,top+10);ctx.stroke();
  if(onGround) BF.legPhase+=0.25;
}

function drawFootprints(){
  footprints.forEach(fp=>{
    ctx.save();ctx.globalAlpha=fp.alpha;ctx.font='11px serif';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText('👣',fp.x,fp.y);ctx.restore();
  });
}
function drawParticles(){
  particles.filter(p=>!p.isText).forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.restore();
  });
}
function drawTextParticles(){
  particles.filter(p=>p.isText).forEach(p=>{
    ctx.save();ctx.globalAlpha=Math.min(p.life,1);ctx.fillStyle=p.color;
    ctx.font='bold 16px "Courier New"';ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y);ctx.restore();
  });
}

// ── COLLISION ─────────────────────────────────────────────────────────────

function checkCollision(a,b){
  const pad=10;
  return !(a.x+a.w-pad<b.x+pad||a.x+pad>b.x+b.w-pad||
           (a.getTop?a.getTop():a.y)+pad>b.y+b.h-pad||
           (a.getTop?a.getTop():a.y)+a.h-pad<b.y+pad);
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────

function reset(){
  score=0;frame=0;speed=4;gameOver=false;
  BF.y=GROUND_Y;BF.vy=0;BF.jumping=false;BF.doubleJumped=false;BF.legPhase=0;
  obstacles=[];collectibles=[];particles=[];footprints=[];lastObstacle=0;lastCollectible=0;
  initBG();
}

function startGame(){
  document.getElementById('title-screen').style.display='none';
  document.getElementById('game-over-screen').style.display='none';
  reset();state='playing';
  if(animId) cancelAnimationFrame(animId);
  loop();
}

function jump(){
  if(state!=='playing') return;
  if(!BF.jumping){BF.vy=-14;BF.jumping=true;}
  else if(!BF.doubleJumped){BF.vy=-11;BF.doubleJumped=true;spawnParticles(BF.x+BF.w/2,BF.getTop()+BF.h/2,'#66bb6a',6);}
}

document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();}});
canvas.addEventListener('click',jump);
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});

function update(){
  frame++;score=Math.floor(frame/6);speed=4+Math.min(score/200,5);
  BF.vy+=0.7;BF.y+=BF.vy;
  if(BF.y>=GROUND_Y){BF.y=GROUND_Y;BF.vy=0;BF.jumping=false;BF.doubleJumped=false;}
  footprintTimer++;
  if(footprintTimer>18&&!BF.jumping){footprintTimer=0;footprints.push({x:BF.x+BF.w/2,y:GROUND_Y+8,alpha:0.7});}
  footprints.forEach(fp=>fp.alpha-=0.004);
  footprints=footprints.filter(fp=>fp.alpha>0);

  const minGap=Math.max(180,350-score*0.5);
  if(frame-lastObstacle>minGap/speed*4){spawnObstacle();lastObstacle=frame;}
  if(frame-lastCollectible>90){spawnCollectible();lastCollectible=frame;}

  obstacles.forEach(o=>o.x-=speed);
  obstacles=obstacles.filter(o=>o.x>-80);
  collectibles.forEach(c=>c.x-=speed);
  collectibles=collectibles.filter(c=>c.x>-60&&!c.collected);

  const bfRect={x:BF.x,y:BF.getTop(),w:BF.w,h:BF.h,getTop:BF.getTop.bind(BF)};
  for(const o of obstacles){if(checkCollision(bfRect,o)){triggerGameOver();return;}}

  collectibles.forEach(c=>{
    const cw=c.sz||28,ch=c.sz||28;
    const bob=Math.sin(frame*0.06+c.x*0.05)*2;
    const cRect={x:c.x,y:c.y+bob,w:cw,h:ch};
    if(!c.collected&&checkCollision(bfRect,cRect)){
      c.collected=true;score+=c.pts;frame+=c.pts*3;
      const col=c.type==='logo'?'#1a75d2':'#e8780a';
      spawnParticles(c.x+cw/2,c.y+ch/2,col,c.type==='logo'?12:8);
      showScorePopup(c.x+cw/2,c.y,`+${c.pts}`,col);
    }
  });

  particles.forEach(p=>{
    if(p.isText){p.y+=p.vy;p.life-=p.decay;}
    else{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=p.decay;}
  });
  particles=particles.filter(p=>p.life>0);
  document.getElementById('score-display').textContent=score;
  document.getElementById('best-display').textContent=best;
  document.getElementById('spd').textContent=speed.toFixed(1)+'x';
}

function triggerGameOver(){
  gameOver=true;state='gameover';
  if(score>best) best=score;
  spawnParticles(BF.x+BF.w/2,BF.getTop()+20,'#e8780a',20);
  document.getElementById('final-score-val').textContent=score;
  document.getElementById('best-score-val').textContent=best;
  document.getElementById('best-display').textContent=best;
  setTimeout(()=>{document.getElementById('game-over-screen').style.display='flex';},600);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawGround();
  drawFootprints();
  obstacles.forEach(drawObstacle);
  collectibles.forEach(drawCollectible);
  drawBigfoot();
  drawParticles();
  drawTextParticles();
  // Subtle forest green vignette sides
  const vig=ctx.createLinearGradient(0,0,W,0);
  vig.addColorStop(0,'rgba(20,60,20,0.3)');
  vig.addColorStop(0.15,'transparent');
  vig.addColorStop(0.85,'transparent');
  vig.addColorStop(1,'rgba(20,60,20,0.3)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
}

function loop(){
  if(state!=='playing') return;
  update();draw();
  if(!gameOver) animId=requestAnimationFrame(loop);
  else draw();
}

initBG();
(function titleDraw(){
  if(state==='title'){ctx.clearRect(0,0,W,H);drawBackground();drawGround();requestAnimationFrame(titleDraw);}
})();
</script>
