    .slot-pin.has-addr { color: #4a7a4a; }
    .slot-badge { font-size: 10px; border-radius: 4px; padding: 2px 6px; margin-top: 3px; display: inline-flex; align-items: center; gap: 3px; }
    .slot-inner { display: flex; flex-direction: column; flex: 1; }
    .empty-slot { background: #fafafa; }
    .empty-slot .slot-text { color: #ccc; font-weight: 400; font-size: 12px; }

    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: flex-end; }

    .modal-label { font-size: 17px; font-weight: 600; margin-bottom: 8px; }

  { day: "Tue 7/7", hour: 11, min: 30, text: "Group Work", addrLabel: "Enzian Inn", addr: "590 US-2, Leavenworth, WA 98826", notes: "", cellColor: "#ddeaf5", fontColor: "#1a3a5a", badgeColor: "#4a7aaa" },
  { day: "Tue 7/7", hour: 12, min: 0, text: "Group Work", addrLabel: "Enzian Inn", addr: "590 US-2, Leavenworth, WA 98826", notes: "", cellColor: "#ddeaf5", fontColor: "#1a3a5a", badgeColor: "#4a7aaa" },
  { day: "Tue 7/7", hour: 12, min: 30, text: "Group Work", addrLabel: "Enzian Inn", addr: "590 US-2, Leavenworth, WA 98826", notes: "", cellColor: "#ddeaf5", fontColor: "#1a3a5a", badgeColor: "#4a7aaa" },

  { day: "Thu 7/9", hour: 16, min: 0, text: "Happy Hour at Brewery (Optional)", addrLabel: "TBD", addr: "", notes: "", cellColor: "#f5ecc8", fontColor: "#5a4a1a", badgeColor: "#8a6f2e" },
  { day: "Thu 7/9", hour: 16, min: 30, text: "Happy Hour at Brewery (Optional)", addrLabel: "TBD", addr: "", notes: "", cellColor: "#f5ecc8", fontColor: "#5a4a1a", badgeColor: "#8a6f2e" },

  { day: "Thu 7/9", hour: 11, min: 30, text: "Group Work", addrLabel: "Enzian Inn", addr: "590 US-2, Leavenworth, WA 98826", notes: "", cellColor: "#ddeaf5", fontColor: "#1a3a5a", badgeColor: "#4a7aaa" },

];

prefill.forEach(p => {
  const key = p.hour + ":" + p.min;
  const ck = key + "|" + p.day;
  if (!cellData[ck]) return;
  cellData[ck].text = p.text || "";
  cellData[ck].cellColor = p.cellColor || "#ffffff";
  cellData[ck].fontColor = p.fontColor || "#111111";
  cellData[ck].badgeColor = p.badgeColor || "#dbeafe";
  if (p.addrLabel) cellData[ck].addrLabel = p.addrLabel;
  if (p.addr) cellData[ck].addr = p.addr;
  if (p.notes) cellData[ck].notes = p.notes;
});

const tabContainer = document.getElementById("day-tabs");
const viewContainer = document.getElementById("day-views");

const treeSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 5,10 8.5,10 4,16 8,16 6,21 18,21 16,16 20,16 15.5,10 19,10"/></svg>';
const treeSmSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 5,10 8.5,10 4,16 8,16 6,21 18,21 16,16 20,16 15.5,10 19,10"/></svg>';

days.forEach((day, di) => {
  const tab = document.createElement("div");
  tab.className = "tab" + (di === 0 ? " active" : "");
  tab.textContent = day;
  tab.onclick = () => switchDay(di);
  tabContainer.appendChild(tab);

  const view = document.createElement("div");
  view.className = "day-view" + (di === 0 ? " active" : "");
  view.id = "view-" + di;

  times.forEach(t => {
    const ck = t.key + "|" + day;
    const d = cellData[ck];
    const isEmpty = !d.text;

    const slot = document.createElement("div");
    slot.className = "slot" + (isEmpty ? " empty-slot" : "");
    slot.style.background = d.cellColor !== "#ffffff" ? d.cellColor : (isEmpty ? "#fafafa" : "#fff");

    const timeEl = document.createElement("div");
    timeEl.className = "slot-time" + (t.isHour ? " hour" : "");
    timeEl.textContent = t.label;
    if (d.cellColor !== "#ffffff") timeEl.style.background = d.cellColor;

    const inner = document.createElement("div");
    inner.className = "slot-inner";

    const content = document.createElement("div");
    content.className = "slot-content";

    const textEl = document.createElement("div");
    textEl.className = "slot-text";
    textEl.textContent = isEmpty ? "" : d.text;
    textEl.style.color = d.fontColor;

    const pin = document.createElement("button");
    pin.className = "slot-pin" + ((d.addrLabel || d.addr) ? " has-addr" : "");
    pin.innerHTML = treeSvg;
    if (d.addrLabel || d.addr) {
      pin.style.color = d.badgeColor;
    }
    pin.onclick = () => openModal(ck, t.label, day);

    content.appendChild(textEl);
    content.appendChild(pin);
    inner.appendChild(content);

    if (d.addrLabel || d.addr) {
      const badge = document.createElement("div");
      badge.className = "slot-badge";
      badge.style.background = d.badgeColor;
      badge.style.color = "#fff";
      badge.innerHTML = treeSmSvg + " " + (d.addrLabel || d.addr).substring(0, 28);
      badge.style.marginLeft = "10px";
      badge.style.marginBottom = "6px";
      badge.onclick = () => openModal(ck, t.label, day);
      inner.appendChild(badge);
    }

    slot.appendChild(timeEl);
    slot.appendChild(inner);
    view.appendChild(slot);
  });

  viewContainer.appendChild(view);
});

function switchDay(di) {
  document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", i === di));
  document.querySelectorAll(".day-view").forEach((v, i) => v.classList.toggle("active", i === di));
}

function openModal(ck, timeLabel, day) {
  const d = cellData[ck];
  document.getElementById("modal-title").textContent = day + " · " + timeLabel;
  const hasData = d.addrLabel || d.addr || d.notes;
  document.getElementById("modal-label").textContent = d.addrLabel || "";
  document.getElementById("modal-label").style.display = d.addrLabel ? "block" : "none";
  document.getElementById("modal-addr").textContent = d.addr || "";
  document.getElementById("modal-addr").style.display = d.addr ? "block" : "none";
  document.getElementById("modal-notes").textContent = d.notes || "";
  document.getElementById("modal-notes").style.display = d.notes ? "block" : "none";
  document.getElementById("modal-empty").style.display = hasData ? "none" : "block";
  document.getElementById("modal-empty").textContent = "No details yet.";
  document.getElementById("modal-backdrop").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-backdrop").classList.remove("open");
}

document.getElementById("modal-backdrop").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
