.hcell {

.hcell:last-child {

.trow {

.trow:last-child {
  border-bottom: none;

.cell:last-child {

const times = [];
for (let h = 8; h < 21; h++) {
  const ampm = h < 12 ? "AM" : "PM";
  const disp = h === 12 ? 12 : h % 12;
  times.push({ key: h + ":0", label: disp + ":00 " + ampm, isHour: true });
  times.push({ key: h + ":30", label: disp + ":30 " + ampm, isHour: false });
}

const cellData = {};
let activeCell = null;

const grid = document.getElementById("schedule-grid");

// Header row
const hrow = document.createElement("div");
hrow.className = "hrow";
hrow.innerHTML =
  '<div class="hcell"></div>' +
  days.map((d) => `<div class="hcell">${d}</div>`).join("");
grid.appendChild(hrow);

// Time rows
times.forEach((t) => {
  const row = document.createElement("div");
  row.className = "trow" + (t.isHour ? " hour-div" : "");

  const lbl = document.createElement("div");
  lbl.className = "tlabel";
  lbl.textContent = t.label;
  row.appendChild(lbl);

  days.forEach((day) => {
    const ck = t.key + "|" + day;
    cellData[ck] = { text: "", addrLabel: "", addr: "", notes: "", color: "#dbeafe", cellColor: "#ffffff", fontColor: "#111111" };

    const cell = document.createElement("div");
    cell.className = "cell";

    const ta = document.createElement("textarea");
    ta.className = "cell-ta";
    ta.rows = 1;
    ta.dataset.ck = ck;
    ta.addEventListener("input", function () {
      cellData[ck].text = this.value;
      this.style.height = "auto";
      this.style.height = Math.max(36, this.scrollHeight) + "px";
    });

    const pin = document.createElement("button");
    pin.className = "pin-btn";
    pin.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 5,10 8.5,10 4,16 8,16 6,21 18,21 16,16 20,16 15.5,10 19,10"/></svg>';
    pin.title = "Add address";
    pin.addEventListener("click", (e) => {
      e.stopPropagation();
      openPanel(ck, t.label, day, pin);
    });

    const badge = document.createElement("div");
    badge.className = "addr-badge";
    badge.id = "badge-" + ck;
    badge.style.display = "none";
    badge.addEventListener("click", () => openPanel(ck, t.label, day, pin));

    cell.appendChild(ta);
    cell.appendChild(pin);
    cell.appendChild(badge);
    row.appendChild(cell);
  });

  grid.appendChild(row);
});

prefill.forEach(p => {
  const key = p.hour + ":" + p.min;
  const ck = key + "|" + p.day;
  if (!cellData[ck]) return;
  cellData[ck].text = p.text || "";
  cellData[ck].cellColor = p.cellColor || "#ffffff";
  cellData[ck].fontColor = p.fontColor || "#111111";
  cellData[ck].color = p.badgeColor || "#dbeafe";
  if (p.addrLabel) cellData[ck].addrLabel = p.addrLabel;
  if (p.addr) cellData[ck].addr = p.addr;
  if (p.notes) cellData[ck].notes = p.notes;

  const ta = document.querySelector(`textarea[data-ck="${ck}"]`) ||
    (() => { const rows = document.querySelectorAll(".trow"); for (const r of rows) { const ta = r.querySelector(".cell-ta"); if (ta && ta.dataset.ck === ck) return ta; } return null; })();

  const allCells = document.querySelectorAll(".cell");
  allCells.forEach(cell => {
    const t = cell.querySelector(".cell-ta");
    if (t && t.dataset.ck === ck) {
      cell.style.background = p.cellColor;
      t.style.color = p.fontColor;
      t.value = p.text || "";
      if (p.addrLabel || p.addr) {
        const pin = cell.querySelector(".pin-btn");
        const badge = cell.querySelector(".addr-badge");
        if (pin) pin.classList.add("has-addr");
        if (badge) {
          badge.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 5,10 8.5,10 4,16 8,16 6,21 18,21 16,16 20,16 15.5,10 19,10"/></svg> ' + (p.addrLabel || p.addr).substring(0, 22);
          badge.style.display = "flex";
          badge.style.background = p.badgeColor;
          badge.style.color = "#ffffff";
        }
      }
    }
  });
});
function openPanel(ck, timeLabel, day, pinEl) {
  activeCell = { ck, pinEl, timeLabel, day };
  const d = cellData[ck];
  document.getElementById("panel-title").textContent = day + " · " + timeLabel;
  const hasData = d.addrLabel || d.addr || d.notes;
  document.getElementById("view-label").textContent = d.addrLabel || "";
  document.getElementById("view-label").style.display = d.addrLabel ? "block" : "none";
  document.getElementById("view-addr").textContent = d.addr || "";
  document.getElementById("view-addr").style.display = d.addr ? "block" : "none";
  document.getElementById("view-notes").textContent = d.notes || "";
  document.getElementById("view-notes").style.display = d.notes ? "block" : "none";
  document.getElementById("view-empty").style.display = hasData ? "none" : "block";

  document.getElementById("view-mode").style.display = "block";
  const backdrop = document.getElementById("backdrop");
  backdrop.classList.add("open");

  const anchor = document.getElementById("panel-anchor");
  const pinRect = pinEl.getBoundingClientRect();
  const wrapRect = document.querySelector(".panel-container").getBoundingClientRect();
  let top = pinRect.bottom - wrapRect.top + 4;
  let left = pinRect.left - wrapRect.left - 250;
  if (left < 0) left = pinRect.right - wrapRect.left + 4;
  anchor.style.top = top + "px";
  anchor.style.left = Math.max(0, left) + "px";
}





function closePanel() {
  document.getElementById("backdrop").classList.remove("open");
  activeCell = null;
}



document.getElementById("backdrop").addEventListener("click", function (e) {
  if (e.target === this) closePanel();
});

function copySchedule() {
  const cols = ["Time", ...days];
  let md = "| " + cols.join(" | ") + " |\n";
  md += "| " + cols.map(() => "---").join(" | ") + " |\n";
  times.forEach((t) => {
    const row = [
      t.label,
      ...days.map((d) => {
        const ck = t.key + "|" + d;
        const cd = cellData[ck];
        let cell = (cd.text || "").replace(/\n/g, " ");
        if (cd.addr) cell += (cell ? " — " : "") + cd.addr;
        return cell;
      }),
    ];
    md += "| " + row.join(" | ") + " |\n";
  });

  navigator.clipboard.writeText(md).then(() => {
    const btn = document.querySelector(".top-bar .btn");
    btn.innerHTML = '<i class="ti ti-check"></i> Copied!';
    setTimeout(() => {
      btn.innerHTML = '<i class="ti ti-copy"></i> Copy as Markdown';
    }, 2000);
  });
}
